# Two preprocessing jobs (median-bg vs flatten_base) with masking sweep.

channel_defaults:
  topography_family: "height"

modes:
  # --- Median-bg preprocessing (2x align + plane + median-bg) ---
  particle_count_align_medianbg_mean:
    channel_family: "height"
    metric_type: "particle_count"
    units: "count"
    expected_units: "count"
    gwyddion_ops:
      - op: align_rows
        params: { direction: "horizontal", method: "median" }
      - op: plane_level
      - op: align_rows
        params: { direction: "horizontal", method: "median" }
      - op: median_level
      - op: median
        params: { size: 3 }
    threshold_strategy: "mean"
    particle_diameter_min_nm: 250
    particle_diameter_max_nm: 550
    isolation_min_dist_nm: 900
    export_particles: true
    edge_exclude: true
    review_pack: { enable: true, sample_limit: 10, seed: 1337 }
    grain_export:
      enable: true
      use_review_sample: true
      quantities: ["center_x", "center_y", "pixel_area", "projected_area", "surface_area", "mean", "max", "min", "rms", "equiv_disc_radius", "equiv_square_side", "equiv_ellipse_major", "equiv_ellipse_minor", "circumcircle_r", "inscribed_disc_r"]

  particle_count_align_medianbg_fixed0:
    channel_family: "height"
    metric_type: "particle_count"
    units: "count"
    expected_units: "count"
    gwyddion_ops:
      - op: align_rows
        params: { direction: "horizontal", method: "median" }
      - op: plane_level
      - op: align_rows
        params: { direction: "horizontal", method: "median" }
      - op: median_level
      - op: median
        params: { size: 3 }
    threshold_strategy: "fixed"
    threshold_fixed: 0.0
    particle_diameter_min_nm: 250
    particle_diameter_max_nm: 550
    isolation_min_dist_nm: 900
    export_particles: true
    edge_exclude: true
    review_pack: { enable: true, sample_limit: 10, seed: 1337 }
    grain_export:
      enable: true
      use_review_sample: true
      quantities: ["center_x", "center_y", "pixel_area", "projected_area", "surface_area", "mean", "max", "min", "rms", "equiv_disc_radius", "equiv_square_side", "equiv_ellipse_major", "equiv_ellipse_minor", "circumcircle_r", "inscribed_disc_r"]

  particle_count_align_medianbg_p95:
    channel_family: "height"
    metric_type: "particle_count"
    units: "count"
    expected_units: "count"
    gwyddion_ops:
      - op: align_rows
        params: { direction: "horizontal", method: "median" }
      - op: plane_level
      - op: align_rows
        params: { direction: "horizontal", method: "median" }
      - op: median_level
      - op: median
        params: { size: 3 }
    threshold_strategy: "percentile"
    threshold_percentile: 95
    particle_diameter_min_nm: 250
    particle_diameter_max_nm: 550
    isolation_min_dist_nm: 900
    export_particles: true
    edge_exclude: true
    review_pack: { enable: true, sample_limit: 10, seed: 1337 }
    grain_export:
      enable: true
      use_review_sample: true
      quantities: ["center_x", "center_y", "pixel_area", "projected_area", "surface_area", "mean", "max", "min", "rms", "equiv_disc_radius", "equiv_square_side", "equiv_ellipse_major", "equiv_ellipse_minor", "circumcircle_r", "inscribed_disc_r"]

  particle_count_align_medianbg_max_fixed0_p95:
    channel_family: "height"
    metric_type: "particle_count"
    units: "count"
    expected_units: "count"
    gwyddion_ops:
      - op: align_rows
        params: { direction: "horizontal", method: "median" }
      - op: plane_level
      - op: align_rows
        params: { direction: "horizontal", method: "median" }
      - op: median_level
      - op: median
        params: { size: 3 }
    # Combined: threshold = max(mean, 0.0, p95)
    threshold_strategy: "max"
    threshold_fixed: 0.0
    threshold_percentile: 95
    particle_diameter_min_nm: 250
    particle_diameter_max_nm: 550
    isolation_min_dist_nm: 900
    export_particles: true
    edge_exclude: true
    review_pack: { enable: true, sample_limit: 10, seed: 1337 }
    grain_export:
      enable: true
      use_review_sample: true
      quantities: ["center_x", "center_y", "pixel_area", "projected_area", "surface_area", "mean", "max", "min", "rms", "equiv_disc_radius", "equiv_square_side", "equiv_ellipse_major", "equiv_ellipse_minor", "circumcircle_r", "inscribed_disc_r"]

  # --- Flatten Base preprocessing (2x align + plane + flatten_base) ---
  particle_count_align_flatten_mean:
    channel_family: "height"
    metric_type: "particle_count"
    units: "count"
    expected_units: "count"
    gwyddion_ops:
      - op: align_rows
        params: { direction: "horizontal", method: "median" }
