# Representative particle-image review config
#
# Purpose:
# - run a curated directory of forward topography TIFFs
# - apply the median-background particle workflow
# - emit mask-overlay review panels for thesis figures / appendix verification
#
# User action later:
# - replace input_root with the curated folder you provide
# - replace output_root if needed

channel_defaults:
  topography_family: "height"

modes:
  particle_count_representative_medianbg_mean:
    channel_family: "height"
    metric_type: "particle_count"
    units: "count"
    expected_units: "count"
    on_unit_mismatch: "warn"
    gwyddion_ops:
      - op: align_rows
        params: { direction: "horizontal", method: "median" }
      - op: plane_level
      - op: align_rows
        params: { direction: "horizontal", method: "median" }
      - op: median_level
      - op: median
        params: { size: 3 }
    threshold_strategy: "mean"
    particle_diameter_min_nm: 250
    particle_diameter_max_nm: 550
    isolation_min_dist_nm: 900
    export_particles: true
    export_particle_mask: true
    export_particle_mask_review_only: false
    edge_exclude: true
    review_pack:
      enable: true
      sample_limit: 0
      seed: 1337
      image_format: "png"
      panel_basename_max_len: 120
      csv_name: "review.csv"
    grain_export:
      enable: true
      use_review_sample: false
      quantities:
        - "center_x"
        - "center_y"
        - "pixel_area"
        - "projected_area"
        - "surface_area"
        - "mean"
        - "max"
        - "min"
        - "rms"
        - "equiv_disc_radius"
        - "equiv_square_side"
        - "equiv_ellipse_major"
        - "equiv_ellipse_minor"
        - "circumcircle_r"
        - "inscribed_disc_r"

  # Optional comparison routes for the same curated directory.
  # Enable later if you want figure-ready comparisons of threshold sensitivity.
  particle_count_representative_medianbg_fixed0:
    channel_family: "height"
    metric_type: "particle_count"
    units: "count"
    expected_units: "count"
    on_unit_mismatch: "warn"
    gwyddion_ops:
      - op: align_rows
        params: { direction: "horizontal", method: "median" }
      - op: plane_level
      - op: align_rows
        params: { direction: "horizontal", method: "median" }
      - op: median_level
      - op: median
        params: { size: 3 }
    threshold_strategy: "fixed"
    threshold_fixed: 0.0
    particle_diameter_min_nm: 250
    particle_diameter_max_nm: 550
    isolation_min_dist_nm: 900
    export_particles: true
    export_particle_mask: true
    export_particle_mask_review_only: false
    edge_exclude: true
    review_pack:
      enable: false
      sample_limit: 0
      seed: 1337
      image_format: "png"
      panel_basename_max_len: 120
      csv_name: "review.csv"

  particle_count_representative_medianbg_p95:
    channel_family: "height"
    metric_type: "particle_count"
    units: "count"
    expected_units: "count"
    on_unit_mismatch: "warn"
    gwyddion_ops:
      - op: align_rows
        params: { direction: "horizontal", method: "median" }
      - op: plane_level
      - op: align_rows
        params: { direction: "horizontal", method: "median" }
      - op: median_level
      - op: median
        params: { size: 3 }
    threshold_strategy: "percentile"
    threshold_percentile: 95
    particle_diameter_min_nm: 250
    particle_diameter_max_nm: 550
    isolation_min_dist_nm: 900
    export_particles: true
    export_particle_mask: true
    export_particle_mask_review_only: false
    edge_exclude: true
    review_pack:
      enable: false
      sample_limit: 0
      seed: 1337
      image_format: "png"
      panel_basename_max_len: 120
      csv_name: "review.csv"

grid:
  index_base: 1
  filename_regex: "LOC_RC(?P<row>\\d{3})(?P<col>\\d{3})"

summarize:
  recursive: true

debug:
  enable: false
  level: "info"
  artifacts: []
  sample_limit: 3
  out_dir: "out/debug"
  log_fields: ["units", "mask_counts", "stats_counts"]
  raise_on_warn: false
  echo_config: false

csv_modes:
  particle_metrics_full:
    columns:
      - { name: "source_file", from: "core.source_file" }
      - { name: "mode", from: "core.mode" }
      - { name: "metric_type", from: "core.metric_type" }
      - { name: "count_total", from: "particle.count_total" }
      - { name: "count_total_raw", from: "particle.count_total_raw" }
      - { name: "count_total_filtered", from: "particle.count_total_filtered" }
      - { name: "count_isolated", from: "particle.count_isolated" }
      - { name: "mean_diam_nm", from: "particle.mean_diameter_nm" }
      - { name: "std_diam_nm", from: "particle.std_diameter_nm" }
      - { name: "threshold", from: "particle.threshold" }
      - { name: "threshold_source", from: "particle.threshold_source", default: "" }
      - { name: "diam_min_nm", from: "particle.filter_min_nm" }
      - { name: "diam_max_nm", from: "particle.filter_max_nm" }
      - { name: "iso_min_dist_nm", from: "particle.isolation_min_dist_nm" }
      - { name: "edge_excluded_count", from: "particle.edge_excluded_count", default: 0 }
      - { name: "panel_file", from: "review.panel_file", default: "" }
      - { name: "nx", from: "core.nx" }
      - { name: "ny", from: "core.ny" }
      - { name: "row_idx", from: "grid.row_idx", default: -1 }
      - { name: "col_idx", from: "grid.col_idx", default: -1 }
    on_missing_field: "warn_null"

result_schemas:
  particle_metrics_full:
    from_csv_mode: "particle_metrics_full"
    fields:
      - { field: "source_file", type: "string", column: "source_file" }
      - { field: "mode", type: "string", column: "mode" }
      - { field: "metric_type", type: "string", column: "metric_type" }
      - { field: "count_total", type: "int", column: "count_total" }
      - { field: "count_total_raw", type: "int", column: "count_total_raw" }
      - { field: "count_total_filtered", type: "int", column: "count_total_filtered" }
      - { field: "count_isolated", type: "int", column: "count_isolated" }
      - { field: "mean_diam_nm", type: "float", column: "mean_diam_nm" }
      - { field: "std_diam_nm", type: "float", column: "std_diam_nm" }
      - { field: "threshold", type: "float", column: "threshold" }
      - { field: "threshold_source", type: "string", column: "threshold_source" }
      - { field: "diam_min_nm", type: "float", column: "diam_min_nm" }
      - { field: "diam_max_nm", type: "float", column: "diam_max_nm" }
      - { field: "iso_min_dist_nm", type: "float", column: "iso_min_dist_nm" }
      - { field: "edge_excluded_count", type: "int", column: "edge_excluded_count" }
      - { field: "panel_file", type: "string", column: "panel_file" }
      - { field: "nx", type: "int", column: "nx" }
      - { field: "ny", type: "int", column: "ny" }
      - { field: "row_idx", type: "int", column: "row_idx" }
      - { field: "col_idx", type: "int", column: "col_idx" }

profiles:
  particle_representative_medianbg_mean:
    processing_mode: "particle_count_representative_medianbg_mean"
    csv_mode: "particle_metrics_full"

  particle_representative_medianbg_fixed0:
    processing_mode: "particle_count_representative_medianbg_fixed0"
    csv_mode: "particle_metrics_full"

  particle_representative_medianbg_p95:
    processing_mode: "particle_count_representative_medianbg_p95"
    csv_mode: "particle_metrics_full"

jobs:
  representative_particle_review_medianbg_mean:
    input_root: "C:/AFM_REVIEW_INPUT"
    output_root: "out/topo_particle/representative_review"
    run_name_template: "representative_particle_review_medianbg_mean"
    profile: "particle_representative_medianbg_mean"
    pattern: "**/*Z Height*Forward*.tif;**/*Z Height*Forward*.tiff"

  representative_particle_review_medianbg_fixed0:
    input_root: "C:/AFM_REVIEW_INPUT"
    output_root: "out/topo_particle/representative_review"
    run_name_template: "representative_particle_review_medianbg_fixed0"
    profile: "particle_representative_medianbg_fixed0"
    pattern: "**/*Z Height*Forward*.tif;**/*Z Height*Forward*.tiff"

  representative_particle_review_medianbg_p95:
    input_root: "C:/AFM_REVIEW_INPUT"
    output_root: "out/topo_particle/representative_review"
    run_name_template: "representative_particle_review_medianbg_p95"
    profile: "particle_representative_medianbg_p95"
    pattern: "**/*Z Height*Forward*.tif;**/*Z Height*Forward*.tiff"

run_ui:
  estimate_enable: true
  estimate_from_history: true
  estimate_seconds_per_scan: null
  progress_enable: true
  progress_bar_width: 30
